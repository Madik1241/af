<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Моя Анимация</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #a1c4fd;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            overflow: hidden;
        }

        /* Трава */
        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100px;
            background: #4CAF50;
            z-index: 1;
        }

        /* Дерево */
        .tree {
            position: relative;
            z-index: 2;
            margin: 0 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: sway 3s ease-in-out infinite alternate;
            transform-origin: bottom;
        }

        .leaves {
            width: 0;
            height: 0;
            border-left: 50px solid transparent;
            border-right: 50px solid transparent;
            border-bottom: 100px solid #2d5a27;
        }

        .trunk {
            width: 20px;
            height: 40px;
            background: #5d4037;
        }

        /* Летающая фигура */
        .shape {
            position: absolute;
            width: 50px;
            height: 50px;
            background: #ff4081;
            top: 20%;
            left: 20%;
            animation: float 5s infinite ease-in-out;
            z-index: 3;
        }

        .circle { border-radius: 50%; background: #ffeb3b; left: 70%; animation-delay: -2s; }

        /* Анимации */
        @keyframes sway {
            from { transform: rotate(-5deg); }
            to { transform: rotate(5deg); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-100px) rotate(180deg); }
        }
    </style>
</head>
<body>

    <div class="shape"></div>
    <div class="shape circle"></div>

    <div class="tree">
        <div class="leaves"></div>
        <div class="trunk"></div>
    </div>

    <div class="tree" style="animation-delay: -1s;">
        <div class="leaves" style="border-bottom-color: #388E3C;"></div>
        <div class="trunk"></div>
    </div>

    <div class="ground"></div>

</body>
</html>
